<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Würfel Duell Live Tracker</title>

<style>
:root {
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
    --dark:#1e293b;
    --light:#f8fafc;
    --gray:#cbd5e1;
    --warning:#f59e0b;
    --cow-gold:#eab308;
}

body {
    font-family: system-ui;
    background: var(--light);
    margin: 0;
    padding: 15px;
    color: var(--dark);
}

.container { max-width: 520px; margin: auto; }

.card {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.flex-group { display:flex; gap:10px; }

input, select {
    width:100%;
    padding:10px;
    border:1px solid var(--gray);
    border-radius:6px;
}

button {
    padding:10px;
    border:none;
    border-radius:6px;
    background:var(--primary);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover { opacity:0.9; }

.player-list { list-style:none; padding:0; }

.player-item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.balance.plus { color: var(--success); }
.balance.minus { color: var(--danger); }

.dice-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    margin-top:10px;
}

.dice-btn {
    font-size:30px;
    background:white;
    border:2px solid var(--gray);
}

.selected-p1 { background:var(--primary); color:white; }
.selected-p2 { background:#6366f1; color:white; }

.cowbell-btn.active {
    background:var(--cow-gold);
    color:black;
}
</style>
</head>

<body>

<div class="container">

<h1>🎲 Würfel Live</h1>

<div class="card">
    <input id="roomInput" placeholder="Raum-Code">
    <button onclick="joinRoom()">Raum verbinden</button>
</div>

<div class="card">
    <input id="name" placeholder="Spieler Name">
    <button onclick="addPlayer()">Hinzufügen</button>
</div>

<div class="card">
    <h3>Duell</h3>

    <select id="p1"></select>
    <div class="dice-grid">
        <button onclick="pick(1,1)">⚀</button>
        <button onclick="pick(1,2)">⚁</button>
        <button onclick="pick(1,3)">⚂</button>
        <button onclick="pick(1,4)">⚃</button>
        <button onclick="pick(1,5)">⚄</button>
        <button onclick="pick(1,6)">⚅</button>
    </div>

    <select id="p2" style="margin-top:10px;"></select>

    <div class="dice-grid">
        <button onclick="pick(2,1)">⚀</button>
        <button onclick="pick(2,2)">⚁</button>
        <button onclick="pick(2,3)">⚂</button>
        <button onclick="pick(2,4)">⚃</button>
        <button onclick="pick(2,5)">⚄</button>
        <button onclick="pick(2,6)">⚅</button>
    </div>

    <button onclick="evaluate()" style="margin-top:10px; background:var(--success); width:100%;">
        Ergebnis eintragen
    </button>
</div>

<div class="card">
    <h3>Leaderboard</h3>
    <ul id="list" class="player-list"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    collection,
    doc,
    setDoc,
    updateDoc,
    deleteDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBrQNvEaEmYO8--EnY6AEOZ6fjsxSDw-fg",
    authDomain: "wuerfelspiel-fac6c.firebaseapp.com",
    projectId: "wuerfelspiel-fac6c",
    storageBucket: "wuerfelspiel-fac6c.firebasestorage.app",
    messagingSenderId: "170655614346",
    appId: "1:170655614346:web:cf3fc483f403d9b4c2f473",
    measurementId: "G-QC51REHX77"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let room = localStorage.getItem("room") || "default";
let players = [];

let p1Score = 0;
let p2Score = 0;

document.getElementById("roomInput").value = room;

function playersRef() {
    return collection(db, "rooms", room, "players");
}

/* ---------------- LIVE SYNC ---------------- */

function listen() {
    onSnapshot(playersRef(), snap => {
        players = snap.docs.map(d => d.data());
        render();
    });
}

listen();

/* ---------------- ROOM ---------------- */

window.joinRoom = function () {
    room = document.getElementById("roomInput").value.trim();
    localStorage.setItem("room", room);
    listen();
};

/* ---------------- PLAYER ---------------- */

window.addPlayer = async function () {
    const name = document.getElementById("name").value.trim();
    if (!name) return;

    await setDoc(doc(db, "rooms", room, "players", name), {
        name,
        balance: 0
    });
};

/* ---------------- RENDER ---------------- */

function render() {
    const list = document.getElementById("list");
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");

    list.innerHTML = "";
    p1.innerHTML = "";
    p2.innerHTML = "";

    players.forEach(p => {

        p1.innerHTML += `<option>${p.name}</option>`;
        p2.innerHTML += `<option>${p.name}</option>`;

        list.innerHTML += `
            <li class="player-item">
                ${p.name}
                <span>${p.balance}€</span>
            </li>
        `;
    });
}

/* ---------------- DICE ---------------- */

window.pick = function (player, val) {
    if (player === 1) p1Score = val;
    else p2Score = val;
};

/* ---------------- MATCH ---------------- */

window.evaluate = async function () {

    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;

    if (!p1 || !p2 || p1 === p2) return;

    const a = players.find(x => x.name === p1);
    const b = players.find(x => x.name === p2);

    if (!a || !b) return;

    if (p1Score > p2Score) {

        await updateDoc(doc(db,"rooms",room,"players",p1), {
            balance: a.balance + p2Score
        });

        await updateDoc(doc(db,"rooms",room,"players",p2), {
            balance: b.balance - p1Score
        });

    } else if (p2Score > p1Score) {

        await updateDoc(doc(db,"rooms",room,"players",p2), {
            balance: b.balance + p1Score
        });

        await updateDoc(doc(db,"rooms",room,"players",p1), {
            balance: a.balance - p2Score
        });
    }

    p1Score = 0;
    p2Score = 0;
};

</script>

</body>
</html>
