<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Würfel Duell Live Tracker</title>

<style>
:root {
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
    --dark:#1e293b;
    --light:#f8fafc;
    --gray:#cbd5e1;
    --warning:#f59e0b;
    --cow-gold:#eab308;
}

body {
    font-family: system-ui;
    background: var(--light);
    margin: 0;
    padding: 15px;
    color: var(--dark);
}

.container { max-width: 500px; margin: auto; }

h1,h2 { text-align:center; }

.card {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.flex-group { display:flex; gap:10px; }

input,select {
    width:100%;
    padding:10px;
    border:1px solid var(--gray);
    border-radius:6px;
}

button {
    padding:10px;
    border:none;
    border-radius:6px;
    background:var(--primary);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover { opacity:0.9; }

.player-list { list-style:none; padding:0; }

.player-item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.balance.plus { color: var(--success); }
.balance.minus { color: var(--danger); }

.dice-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    margin-top:10px;
}

.dice-btn {
    font-size:30px;
    background:white;
    border:2px solid var(--gray);
    padding:5px;
}

.selected-p1 { background:var(--primary); color:white; }
.selected-p2 { background:#6366f1; color:white; }

.cowbell-btn.active {
    background:var(--cow-gold);
    color:black;
}
</style>
</head>

<body>

<div class="container">

<h1>🎲 Würfel Duell</h1>

<div class="card">
    <input id="roomKeyInput" placeholder="Raum-Code">
    <button onclick="connectRoom()">Verbinden</button>
</div>

<div class="card">
    <input id="playerName" placeholder="Spieler Name">
    <button onclick="addPlayer()">Hinzufügen</button>
</div>

<div class="card">
    <h2>Duell</h2>

    <select id="p1Select"></select>

    <div class="dice-grid">
        <button onclick="selectDice(1,1)">⚀</button>
        <button onclick="selectDice(1,2)">⚁</button>
        <button onclick="selectDice(1,3)">⚂</button>
        <button onclick="selectDice(1,4)">⚃</button>
        <button onclick="selectDice(1,5)">⚄</button>
        <button onclick="selectDice(1,6)">⚅</button>
    </div>

    <select id="p2Select" style="margin-top:10px;"></select>

    <div class="dice-grid">
        <button onclick="selectDice(2,1)">⚀</button>
        <button onclick="selectDice(2,2)">⚁</button>
        <button onclick="selectDice(2,3)">⚂</button>
        <button onclick="selectDice(2,4)">⚃</button>
        <button onclick="selectDice(2,5)">⚄</button>
        <button onclick="selectDice(2,6)">⚅</button>
    </div>

    <button onclick="evaluate()" style="margin-top:10px; background:var(--success); width:100%;">
        Ergebnis eintragen
    </button>
</div>

<div class="card">
    <h2>Leaderboard</h2>
    <ul id="list" class="player-list"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "DEIN KEY",
  authDomain: "wuerfelspiel-fac6c.firebaseapp.com",
  projectId: "wuerfelspiel-fac6c",
  storageBucket: "wuerfelspiel-fac6c.firebasestorage.app",
  messagingSenderId: "170655614346",
  appId: "1:170655614346:web:cf3fc483f403d9b4c2f473"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let room = "default";
let players = [];
let p1 = 0;
let p2 = 0;

function roomRef() {
  return doc(db, "rooms", room);
}

/* 🔥 LIVE SYNC */
function listen() {
  onSnapshot(roomRef(), (snap) => {
    if (!snap.exists()) return;
    players = snap.data().players || [];
    render();
  });
}

listen();

/* ROOM */
window.connectRoom = function () {
  room = document.getElementById("roomKeyInput").value.trim();
  if (!room) return;
  listen();
};

/* SAVE */
async function save() {
  await setDoc(roomRef(), { players });
}

/* PLAYER */
window.addPlayer = async function () {
  const name = document.getElementById("playerName").value.trim();
  if (!name) return;

  players.push({ name, balance: 0 });
  await save();
};

/* RENDER */
function render() {
  const list = document.getElementById("list");
  const p1s = document.getElementById("p1Select");
  const p2s = document.getElementById("p2Select");

  list.innerHTML = "";
  p1s.innerHTML = "";
  p2s.innerHTML = "";

  players.forEach(p => {

    p1s.innerHTML += `<option>${p.name}</option>`;
    p2s.innerHTML += `<option>${p.name}</option>`;

    list.innerHTML += `
      <li class="player-item">
        ${p.name}
        <span>${p.balance}€</span>
      </li>
    `;
  });
}

/* DICE */
window.selectDice = function (player, val) {
  if (player === 1) p1 = val;
  else p2 = val;
};

/* MATCH */
window.evaluate = async function () {

  const aName = document.getElementById("p1Select").value;
  const bName = document.getElementById("p2Select").value;

  const a = players.find(x => x.name === aName);
  const b = players.find(x => x.name === bName);

  if (!a || !b || p1 === 0 || p2 === 0) return;

  if (p1 > p2) {
    a.balance += p2;
    b.balance -= p1;
  } else if (p2 > p1) {
    b.balance += p1;
    a.balance -= p2;
  }

  await save();
};

</script>

</body>
</html>
