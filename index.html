<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Würfel Duell Live Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/bugout@1.0.1/bugout.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #cbd5e1;
            --warning: #f59e0b;
            --cow-gold: #eab308;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--dark);
            margin-top: 10px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .flex-group {
            display: flex;
            gap: 10px;
        }

        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid var(--gray);
            border-radius: 6px;
            font-size: 16px;
            background: white;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        .player-list {
            list-style: none;
            padding: 0;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid #e2e8f0;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .balance {
            font-weight: bold;
            margin-right: 5px;
        }
        .plus { color: var(--success); }
        .minus { color: var(--danger); }

        .btn-action {
            background: none;
            border: none;
            padding: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .btn-reset-single { color: var(--warning); }
        .btn-delete { color: var(--danger); }

        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .player-box {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .player-box label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .dice-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .dice-btn {
            background: white;
            color: var(--dark);
            border: 2px solid var(--gray);
            border-radius: 10px;
            padding: 4px 0;
            font-size: 36px;
            line-height: 1;
            transition: all 0.15s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dice-btn.selected-p1 {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .dice-btn.selected-p2 {
            background-color: #6366f1;
            color: white;
            border-color: #6366f1;
            transform: scale(1.05);
        }

        .global-cowbell-wrapper {
            margin: 15px 0;
            text-align: center;
        }

        .cowbell-btn {
            width: 100%;
            background: white;
            color: #64748b;
            border: 2px solid var(--gray);
            border-radius: 10px;
            padding: 12px 0;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            transition: all 0.15s ease;
        }

        .cowbell-btn span {
            font-size: 16px;
            font-weight: bold;
        }

        .cowbell-btn.active {
            background-color: var(--cow-gold);
            color: #000;
            border-color: var(--cow-gold);
            box-shadow: 0 4px 10px rgba(234, 179, 8, 0.4);
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--success);
            padding: 14px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-reset {
            width: 100%;
            background-color: #64748b;
            padding: 8px;
            font-size: 14px;
        }

        .status-bar {
            font-size: 11px;
            text-align: center;
            color: #64748b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 Würfel-Duell Live</h1>

    <div class="card" style="background: #e0f2fe; border: 1px solid #7dd3fc;">
        <h3 style="margin-top:0; margin-bottom:8px; text-align:center; color:#0369a1;">👥 Gemeinsam spielen</h3>
        <p style="font-size:13px; margin: 0 0 10px 0; text-align:center; color:#0c4a6e;">Nutze den Standard-Raumcode oder erstelle einen eigenen:</p>
        <div class="flex-group">
            <input type="text" id="roomKeyInput" placeholder="Raum-Code eintragen...">
            <button onclick="connectToRoom()" style="background:#0284c7;">Verbinden</button>
        </div>
        <div id="syncStatus" class="status-bar" style="margin-top: 8px; margin-bottom:0; font-weight:bold;">Suche andere Spieler...</div>
    </div>

    <div class="card">
        <h2>Spieler hinzufügen</h2>
        <div class="flex-group">
            <input type="text" id="playerName" placeholder="Name eingeben...">
            <button onclick="addPlayer()">Hinzufügen</button>
        </div>
    </div>

    <div class="card">
        <h2>Duell eintragen</h2>
        <div class="match-grid">
            <div class="player-box">
                <label for="p1Select">Spieler 1</label>
                <select id="p1Select" onchange="resetDiceSelection(1)"></select>
                
                <div class="dice-grid">
                    <button class="dice-btn" id="p1-d1" onclick="selectDice(1, 1)">⚀</button>
                    <button class="dice-btn" id="p1-d2" onclick="selectDice(1, 2)">⚁</button>
                    <button class="dice-btn" id="p1-d3" onclick="selectDice(1, 3)">⚂</button>
                    <button class="dice-btn" id="p1-d4" onclick="selectDice(1, 4)">⚃</button>
                    <button class="dice-btn" id="p1-d5" onclick="selectDice(1, 5)">⚄</button>
                    <button class="dice-btn" id="p1-d6" onclick="selectDice(1, 6)">⚅</button>
                </div>
            </div>
            
            <div class="player-box">
                <label for="p2Select">Spieler 2</label>
                <select id="p2Select" onchange="resetDiceSelection(2)"></select>
                
                <div class="dice-grid">
                    <button class="dice-btn" id="p2-d1" onclick="selectDice(2, 1)">⚀</button>
                    <button class="dice-btn" id="p2-d2" onclick="selectDice(2, 2)">⚁</button>
                    <button class="dice-btn" id="p2-d3" onclick="selectDice(2, 3)">⚂</button>
                    <button class="dice-btn" id="p2-d4" onclick="selectDice(2, 4)">⚃</button>
                    <button class="dice-btn" id="p2-d5" onclick="selectDice(2, 5)">⚄</button>
                    <button class="dice-btn" id="p2-d6" onclick="selectDice(2, 6)">⚅</button>
                </div>
            </div>
        </div>

        <div class="global-cowbell-wrapper">
            <button class="cowbell-btn" id="global-bell" onclick="toggleCowbell()">🐮 <span>Kuhglocke (Inaktiv)</span></button>
        </div>

        <button class="btn-submit" onclick="evaluateMatch()">Ergebnis eintragen</button>
    </div>

    <div class="card">
        <h2>Kontostand</h2>
        <ul id="leaderboard" class="player-list"></ul>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        <button class="btn-reset" onclick="resetGame()">Alle Spieler löschen</button>
    </div>
</div>

<script>
    let b = null;
    let roomName = localStorage.getItem('wuerfelRoomKey') || 'duell-347365';
    localStorage.setItem('wuerfelRoomKey', roomName);
    document.getElementById('roomKeyInput').value = roomName;

    // Daten werden primär lokal gespeichert, damit die App SOFORT flüssig nutzbar ist
    let players = JSON.parse(localStorage.getItem('wuerfelP2P_' + roomName)) || [];
    let p1ChosenScore = 0;
    let p2ChosenScore = 0;
    let globalBellActive = false;

    // UI sofort laden
    updateUI();
    initP2P();

    function initP2P() {
        setStatusBar("🔄 Verbinde direkt mit Mitspielern...", "var(--warning)");
        
        if (b) { try { b.destroy(); } catch(e){} }

        // Wir erstellen ein dezentrales Peer-Netzwerk basierend auf dem Raumnamen
        // Komplett ohne externe API-Keys oder Server-Konten!
        b = new Bugout(roomName);

        // Sobald wir einen anderen Spieler im selben Raum finden
        b.on("seen", (address) => {
            setStatusBar(`🟢 Verbunden mit Mitspieler! (Raum: ${roomName})`, "var(--success)");
            // Fordere die aktuellen Daten der anderen an
            b.send({ type: "PING" });
        });

        // Wenn wir eine Nachricht von einem Freund erhalten
        b.on("message", (address, msg) => {
            if (msg && msg.type === "UPDATE") {
                // Nur aktualisieren, wenn die empfangenen Daten neuer oder länger sind
                if (msg.data && JSON.stringify(msg.data) !== JSON.stringify(players)) {
                    players = msg.data;
                    localStorage.setItem('wuerfelP2P_' + roomName, JSON.stringify(players));
                    updateUI();
                }
                setStatusBar(`🟢 Synchronisiert (Raum: ${roomName})`, "var(--success)");
            } else if (msg && msg.type === "PING") {
                // Jemand fragt nach unseren Daten -> Sende sie ihm direkt rüber
                broadcastData();
            }
        });

        // Falls nach 5 Sekunden niemand online ist, ist das auch okay (man ist der Erste im Raum)
        setTimeout(() => {
            if(document.getElementById('syncStatus').textContent.includes("🔄")) {
                setStatusBar(`🟢 Bereit im Raum: ${roomName} (Warte auf Freunde...)`, "var(--success)");
            }
        }, 4000);
    }

    function broadcastData() {
        if (b) {
            b.send({
                type: "UPDATE",
                data: players
            });
        }
    }

    function saveAndSync() {
        localStorage.setItem('wuerfelP2P_' + roomName, JSON.stringify(players));
        broadcastData();
    }

    function setStatusBar(text, color) {
        const bar = document.getElementById('syncStatus');
        if(bar) {
            bar.textContent = text;
            bar.style.color = color;
        }
    }

    function connectToRoom() {
        const inputVal = document.getElementById('roomKeyInput').value.trim();
        if(inputVal !== "") {
            roomName = inputVal.replace(/[^a-zA-Z0-9-_]/g, ''); 
            localStorage.setItem('wuerfelRoomKey', roomName);
            document.getElementById('roomKeyInput').value = roomName;
            
            players = JSON.parse(localStorage.getItem('wuerfelP2P_' + roomName)) || [];
            updateUI();
            
            initP2P();
        }
    }

    function addPlayer() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        
        if (name === '') return;
        if (players.some(p => p.name === name)) {
            alert('Spieler existiert bereits!');
            return;
        }

        players.push({ name: name, balance: 0 });
        nameInput.value = '';
        
        updateUI();
        saveAndSync();
    }

    function resetPlayerBalance(name) {
        if (confirm(`Möchtest du den Kontostand von ${name} wirklich auf 0 € zurücksetzen?`)) {
            const player = players.find(p => p.name === name);
            if (player) {
                player.balance = 0;
                updateUI();
                saveAndSync();
            }
        }
    }

    function deletePlayer(name) {
        if (confirm(`Möchtest du ${name} wirklich komplett löschen?`)) {
            players = players.filter(p => p.name !== name);
            updateUI();
            saveAndSync();
        }
    }

    function selectDice(playerNum, score) {
        resetDiceSelection(playerNum);
        if (playerNum === 1) {
            p1ChosenScore = score;
            document.getElementById(`p1-d${score}`).classList.add('selected-p1');
        } else {
            p2ChosenScore = score;
            document.getElementById(`p2-d${score}`).classList.add('selected-p2');
        }
    }

    function resetDiceSelection(playerNum) {
        if (playerNum === 1) {
            p1ChosenScore = 0;
            for (let i = 1; i <= 6; i++) {
                if(document.getElementById(`p1-d${i}`)) document.getElementById(`p1-d${i}`).classList.remove('selected-p1');
            }
        } else {
            p2ChosenScore = 0;
            for (let i = 1; i <= 6; i++) {
                if(document.getElementById(`p2-d${i}`)) document.getElementById(`p2-d${i}`).classList.remove('selected-p2');
            }
        }
    }

    function toggleCowbell() {
        globalBellActive = !globalBellActive;
        const btn = document.getElementById('global-bell');
        if (globalBellActive) {
            btn.classList.add('active');
            btn.innerHTML = '🔔 <span>Kuhglocke AKTIV (Doppelter Einsatz!)</span>';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '🐮 <span>Kuhglocke (Inaktiv)</span>';
        }
    }

    function resetBell() {
        globalBellActive = false;
        const btn = document.getElementById('global-bell');
        if(btn) {
            btn.classList.remove('active');
            btn.innerHTML = '🐮 <span>Kuhglocke (Inaktiv)</span>';
        }
    }

    function updateUI() {
        const p1Select = document.getElementById('p1Select');
        const p2Select = document.getElementById('p2Select');
        const leaderboard = document.getElementById('leaderboard');

        if(!p1Select || !p2Select || !leaderboard) return;

        const currentP1 = p1Select.value;
        const currentP2 = p2Select.value;

        players.sort((a, b) => b.balance - a.balance);

        p1Select.innerHTML = '<option value="">-- Spieler 1 --</option>';
        p2Select.innerHTML = '<option value="">-- Spieler 2 --</option>';
        leaderboard.innerHTML = '';

        players.forEach(player => {
            let opt1 = document.createElement('option');
            opt1.value = player.name;
            opt1.textContent = player.name;
            if(player.name === currentP1) opt1.selected = true;
            p1Select.appendChild(opt1);

            let opt2 = document.createElement('option');
            opt2.value = player.name;
            opt2.textContent = player.name;
            if(player.name === currentP2) opt2.selected = true;
            p2Select.appendChild(opt2);

            let li = document.createElement('li');
            li.className = 'player-item';
            
            let formatBalance = player.balance >= 0 ? `+${player.balance} €` : `${player.balance} €`;
            let balanceClass = player.balance >= 0 ? 'plus' : 'minus';

            li.innerHTML = `
                <span>${player.name}</span>
                <div class="player-info">
                    <span class="balance ${balanceClass}">${formatBalance}</span>
                    <button class="btn-action btn-reset-single" onclick="resetPlayerBalance('${player.name}')" title="Kontostand auf 0 setzen">🔄</button>
                    <button class="btn-action btn-delete" onclick="deletePlayer('${player.name}')" title="Spieler komplett löschen">🗑️</button>
                </div>
            `;
            leaderboard.appendChild(li);
        });
    }

    function evaluateMatch() {
        const p1Name = document.getElementById('p1Select').value;
        const p2Name = document.getElementById('p2Select').value;

        if (!p1Name || !p2Name) { alert('Bitte beide Spieler auswählen!'); return; }
        if (p1Name === p2Name) { alert('Ein Spieler kann nicht gegen sich selbst spielen!'); return; }
        if (p1ChosenScore === 0 || p2ChosenScore === 0) { alert('Bitte für beide Spieler einen Würfel auswählen!'); return; }

        const p1 = players.find(p => p.name === p1Name);
        const p2 = players.find(p => p.name === p2Name);

        let multiplier = globalBellActive ? 2 : 1;

        if (p1ChosenScore > p2ChosenScore) {
            p1.balance += (p2ChosenScore * multiplier);
            p2.balance -= (p1ChosenScore * multiplier);
        } else if (p2ChosenScore > p1ChosenScore) {
            p2.balance += (p1ChosenScore * multiplier);
            p1.balance -= (p2ChosenScore * multiplier);
        } else {
            alert('Unentschieden! Keine Beträge verbucht.');
        }

        resetDiceSelection(1);
        resetDiceSelection(2);
        resetBell();

        updateUI();
        saveAndSync();
    }

    function resetGame() {
        if (confirm('Möchtest du wirklich die komplette Liste löschen?')) {
            players = [];
            resetDiceSelection(1);
            resetDiceSelection(2);
            resetBell();
            updateUI();
            saveAndSync();
        }
    }
</script>

</body>
</html>
